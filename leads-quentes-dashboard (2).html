<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Leads Quentes — Sinta Iandê</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: #2e3248;
    --accent: #7c6af7;
    --accent2: #5b4fe0;
    --hot: #ff4f4f;
    --warm: #ff9f43;
    --cool: #54a0ff;
    --success: #1dd1a1;
    --text: #e8eaf6;
    --muted: #8b8fa8;
    --danger: #ff6b6b;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--hot));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .logo-text span {
    font-size: 11px;
    color: var(--muted);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .push-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    transition: all .2s;
  }

  .push-btn.active {
    border-color: var(--success);
    color: var(--success);
    background: rgba(29, 209, 161, 0.08);
  }

  .push-btn:hover { border-color: var(--accent); color: var(--text); }

  .add-demo-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: opacity .2s;
  }

  .add-demo-btn:hover { opacity: .85; }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 160px;
  }

  .stat-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .stat-icon.hot { background: rgba(255,79,79,.15); }
  .stat-icon.pending { background: rgba(255,159,67,.15); }
  .stat-icon.done { background: rgba(29,209,161,.15); }
  .stat-icon.total { background: rgba(124,106,247,.15); }

  .stat-info label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .stat-info strong {
    display: block;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  /* MAIN */
  main {
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title .badge {
    background: var(--hot);
    color: white;
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
  }

  /* LEAD CARD */
  .leads-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .lead-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: all .25s;
    position: relative;
    overflow: hidden;
    animation: slideIn .35s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .lead-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 4px 0 0 4px;
  }

  .lead-card.urgencia-5::before { background: var(--hot); }
  .lead-card.urgencia-4::before { background: var(--warm); }
  .lead-card.urgencia-3::before { background: var(--cool); }
  .lead-card.urgencia-2::before, .lead-card.urgencia-1::before { background: var(--muted); }

  .lead-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-1px);
  }

  .lead-card.done {
    opacity: .5;
    border-color: var(--success);
  }

  .lead-card.done::before { background: var(--success); }

  .lead-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .lead-info {
    flex: 1;
    min-width: 0;
  }

  .lead-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .lead-meta {
    display: flex;
    gap: 14px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .lead-meta span {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .lead-tags {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .tag {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid;
  }

  .tag.urgencia-5 { background: rgba(255,79,79,.12); border-color: rgba(255,79,79,.3); color: #ff4f4f; }
  .tag.urgencia-4 { background: rgba(255,159,67,.12); border-color: rgba(255,159,67,.3); color: #ff9f43; }
  .tag.urgencia-3 { background: rgba(84,160,255,.12); border-color: rgba(84,160,255,.3); color: #54a0ff; }
  .tag.urgencia-2, .tag.urgencia-1 { background: rgba(139,143,168,.1); border-color: rgba(139,143,168,.2); color: var(--muted); }

  /* TIMER */
  .lead-timer {
    text-align: center;
    flex-shrink: 0;
    min-width: 80px;
  }

  .timer-display {
    font-size: 20px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    line-height: 1;
  }

  .timer-display.warning { color: var(--warm); }
  .timer-display.critical { color: var(--hot); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .5; }
  }

  .timer-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  /* ACTION BTN */
  .lead-actions {
    flex-shrink: 0;
  }

  .btn-contact {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--success), #00b894);
    color: white;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .btn-contact:hover { transform: scale(1.04); opacity: .9; }

  .btn-contact.done-btn {
    background: var(--surface2);
    border: 1px solid var(--success);
    color: var(--success);
    cursor: default;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* TOAST */
  #toast-container {
    position: fixed;
    top: 80px;
    right: 24px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .toast {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 4px solid var(--hot);
    border-radius: 12px;
    padding: 14px 18px;
    min-width: 280px;
    max-width: 340px;
    animation: toastIn .3s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .toast-title { font-size: 13px; font-weight: 700; color: var(--hot); margin-bottom: 4px; }
  .toast-body { font-size: 12px; color: var(--muted); }

  /* WEBHOOK INDICATOR */
  .webhook-info {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .webhook-info code {
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--accent);
    border: 1px solid var(--border);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    animation: blink 2s infinite;
    flex-shrink: 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: .2; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🔥</div>
    <div class="logo-text">
      <h1>Leads Quentes</h1>
      <span>Sinta Iandê — Time Comercial</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="push-btn" id="pushBtn" onclick="togglePush()">
      🔔 Ativar Notificações
    </button>
    <button class="add-demo-btn" onclick="addDemoLead()">
      + Simular Lead
    </button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-icon hot">🔥</div>
    <div class="stat-info">
      <label>Urgência Máxima</label>
      <strong id="stat-hot">0</strong>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon pending">⏳</div>
    <div class="stat-info">
      <label>Aguardando</label>
      <strong id="stat-pending">0</strong>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon done">✅</div>
    <div class="stat-info">
      <label>Contactados Hoje</label>
      <strong id="stat-done">0</strong>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon total">📊</div>
    <div class="stat-info">
      <label>Total do Dia</label>
      <strong id="stat-total">0</strong>
    </div>
  </div>
</div>

<main>
  <div class="webhook-info">
    <div class="dot"></div>
    <span>Aguardando leads via webhook do RD Marketing →</span>
    <code>POST /api/leads</code>
    <span style="margin-left:auto; font-size:11px;">Ou clique em "Simular Lead" para testar</span>
  </div>

  <div class="section-title">
    Leads aguardando contato <span class="badge" id="badge-count">0</span>
  </div>

  <div class="leads-list" id="leads-list">
    <div class="empty-state" id="empty-state">
      <div class="emoji">🎯</div>
      <p>Nenhum lead quente no momento.<br>Clique em "Simular Lead" para ver o dashboard em ação.</p>
    </div>
  </div>
</main>

<div id="toast-container"></div>

<script>
  // ---- DADOS ----
  const leads = [];
  let pushEnabled = false;
  let leadIdCounter = 1;

  const nomes = ['Ana Carvalho','Bruno Mendes','Camila Torres','Diego Alves','Fernanda Lima','Rafael Costa','Juliana Pires','Marcelo Souza','Patrícia Nunes','Thiago Rocha'];
  const empresas = ['TechCorp Ltda','Grupo Almeida','StartupXYZ','Construtora ABC','Clínica Vida','Colégio Futuro','Academia Força','Hotel Bela Vista','Restaurante Arte','Farmácia Bem Estar'];
  const urgencias = [
    { nivel: 5, label: '🔥 Urgência Máxima', classe: 'urgencia-5' },
    { nivel: 4, label: '⚡ Alta Urgência', classe: 'urgencia-4' },
    { nivel: 3, label: '📌 Urgência Média', classe: 'urgencia-3' },
    { nivel: 2, label: '🕐 Urgência Baixa', classe: 'urgencia-2' },
    { nivel: 1, label: '📋 Sem Urgência', classe: 'urgencia-1' },
  ];
  const interesses = ['Evento Corporativo +500','Evento Corporativo 100-499','Confraternização','Workshop','Evento Social'];
  const avatarColors = ['#7c6af7','#ff4f4f','#ff9f43','#54a0ff','#1dd1a1','#fd79a8','#fdcb6e','#e17055'];

  function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function getInitials(name) { return name.split(' ').slice(0,2).map(n=>n[0]).join(''); }
  function formatTimer(seconds) {
    const m = Math.floor(seconds/60), s = seconds%60;
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }

  // ---- ADICIONAR LEAD ----
  function addDemoLead() {
    const urg = randomFrom(urgencias);
    const nome = randomFrom(nomes);
    const lead = {
      id: leadIdCounter++,
      nome,
      empresa: randomFrom(empresas),
      telefone: `(11) 9${Math.floor(Math.random()*9000+1000)}-${Math.floor(Math.random()*9000+1000)}`,
      interesse: randomFrom(interesses),
      urgencia: urg,
      timestamp: Date.now(),
      seconds: 0,
      done: false,
      color: randomFrom(avatarColors),
    };
    leads.unshift(lead);
    renderLeads();
    updateStats();
    showToast(lead);
    sendPushNotification(lead);
  }

  // Também aceita dados externos (webhook simulado)
  function addLeadFromWebhook(data) {
    const urg = urgencias.find(u => u.nivel === (data.urgencia || 5)) || urgencias[0];
    const lead = {
      id: leadIdCounter++,
      nome: data.nome || 'Lead RD Station',
      empresa: data.empresa || '—',
      telefone: data.telefone || '—',
      interesse: data.interesse || '—',
      urgencia: urg,
      timestamp: Date.now(),
      seconds: 0,
      done: false,
      color: randomFrom(avatarColors),
    };
    leads.unshift(lead);
    renderLeads();
    updateStats();
    showToast(lead);
    sendPushNotification(lead);
  }

  // ---- MARCAR COMO CONTATO FEITO ----
  function markDone(id) {
    const lead = leads.find(l => l.id === id);
    if (!lead || lead.done) return;
    lead.done = true;
    lead.doneAt = lead.seconds;
    renderLeads();
    updateStats();
  }

  // ---- RENDER ----
  function renderLeads() {
    const list = document.getElementById('leads-list');
    const empty = document.getElementById('empty-state');

    if (leads.length === 0) {
      list.innerHTML = '';
      list.appendChild(empty);
      return;
    }

    list.innerHTML = '';
    leads.forEach(lead => {
      const card = document.createElement('div');
      card.className = `lead-card ${lead.urgencia.classe} ${lead.done ? 'done' : ''}`;
      card.id = `lead-${lead.id}`;

      const timerClass = lead.seconds > 3600 ? 'critical' : lead.seconds > 1800 ? 'warning' : '';

      card.innerHTML = `
        <div class="lead-avatar" style="background:${lead.color}">${getInitials(lead.nome)}</div>
        <div class="lead-info">
          <div class="lead-name">${lead.nome}</div>
          <div class="lead-meta">
            <span>🏢 ${lead.empresa}</span>
            <span>📞 ${lead.telefone}</span>
          </div>
          <div class="lead-tags">
            <span class="tag ${lead.urgencia.classe}">${lead.urgencia.label}</span>
            <span class="tag urgencia-3">📋 ${lead.interesse}</span>
          </div>
        </div>
        <div class="lead-timer">
          <div class="timer-display ${timerClass}" id="timer-${lead.id}">${formatTimer(lead.seconds)}</div>
          <div class="timer-label">${lead.done ? '✅ contactado' : 'aguardando'}</div>
        </div>
        <div class="lead-actions">
          ${lead.done
            ? `<button class="btn-contact done-btn">✅ Contato feito</button>`
            : `<button class="btn-contact" onclick="markDone(${lead.id})">✅ Marcar contato</button>`
          }
        </div>
      `;
      list.appendChild(card);
    });
  }

  // ---- STATS ----
  function updateStats() {
    const hot = leads.filter(l => !l.done && l.urgencia.nivel === 5).length;
    const pending = leads.filter(l => !l.done).length;
    const done = leads.filter(l => l.done).length;
    document.getElementById('stat-hot').textContent = hot;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-total').textContent = leads.length;
    document.getElementById('badge-count').textContent = pending;
  }

  // ---- TIMER TICK ----
  setInterval(() => {
    leads.forEach(lead => {
      if (!lead.done) {
        lead.seconds++;
        const el = document.getElementById(`timer-${lead.id}`);
        if (el) {
          el.textContent = formatTimer(lead.seconds);
          el.className = 'timer-display ' + (lead.seconds > 3600 ? 'critical' : lead.seconds > 1800 ? 'warning' : '');
        }
      }
    });
    updateStats();
  }, 1000);

  // ---- TOAST ----
  function showToast(lead) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `
      <div class="toast-title">🔥 Novo lead quente!</div>
      <div class="toast-body"><strong>${lead.nome}</strong> — ${lead.empresa}<br>${lead.urgencia.label}</div>
    `;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 5000);
  }

  // ---- WEB PUSH ----
  async function togglePush() {
    if (pushEnabled) {
      pushEnabled = false;
      document.getElementById('pushBtn').className = 'push-btn';
      document.getElementById('pushBtn').textContent = '🔔 Ativar Notificações';
      return;
    }
    if (!('Notification' in window)) {
      alert('Seu navegador não suporta notificações push.');
      return;
    }
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      pushEnabled = true;
      document.getElementById('pushBtn').className = 'push-btn active';
      document.getElementById('pushBtn').innerHTML = '🔔 Notificações ativas';
      new Notification('✅ Notificações ativadas!', {
        body: 'Você receberá alertas de novos leads quentes.',
        icon: '🔥'
      });
    } else {
      alert('Permissão negada. Ative nas configurações do navegador.');
    }
  }

  function sendPushNotification(lead) {
    if (!pushEnabled || Notification.permission !== 'granted') return;
    new Notification(`🔥 Novo Lead Quente — ${lead.urgencia.label}`, {
      body: `${lead.nome} · ${lead.empresa}\n${lead.interesse}`,
    });
  }

  // ---- INIT com 3 leads demo ----
  setTimeout(() => { addDemoLead(); }, 300);
  setTimeout(() => { addDemoLead(); }, 600);
  setTimeout(() => { addDemoLead(); }, 900);
</script>
</body>
</html>
