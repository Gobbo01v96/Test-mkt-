<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinta Iandê | Dashboard de Leads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        
        /* Cores Dinâmicas de Urgência */
        .urgencia-5 { border-left: 10px solid #ff4f4f; } /* Vermelho: 500+ */
        .urgencia-4 { border-left: 10px solid #fb923c; } /* Laranja: 200-500 */
        .urgencia-3 { border-left: 10px solid #facc15; } /* Amarelo: 100-200 */
        .urgencia-2 { border-left: 10px solid #4ade80; } /* Verde: <100 */
        .urgencia-1 { border-left: 10px solid #94a3b8; } /* Cinza: Geral */
        
        .card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; transform: translateY(20px); animation: fadeInUp 0.5s forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        
        /* Pulsação para novos leads */
        .lead-novo { animation: pulseNew 2s infinite; }
        @keyframes pulseNew { 
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.6); } 
            70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } 
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-slate-800 pb-8 gap-6">
            <div class="flex items-center gap-4">
                <div class="bg-white p-2 rounded-lg">
                    <img src="https://sintaiande.com.br/wp-content/uploads/2023/10/logo-sinta-iande-preto.png" alt="Sinta Iandê" class="h-8">
                </div>
                <h1 class="text-2xl font-bold uppercase tracking-tight">Monitor de Performance</h1>
            </div>
            <div id="status" class="flex items-center gap-3 px-4 py-2 bg-slate-800 rounded-full text-sm font-semibold border border-slate-700">
                <span class="flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-3 w-3 rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                Sincronizado em Tempo Real
            </div>
        </header>

        <div id="grid-leads" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="no-leads" class="hidden text-center py-32 text-slate-500 italic text-xl">Nenhum lead aguardando atendimento.</div>
    </div>

    <script>
        const FIREBASE_URL = "https://dados-rd-default-rtdb.firebaseio.com/"; // <-- COLE SUA URL AQUI
        let leadsAtuais = [];

        function formatarTempo(timestamp) {
            const diff = Math.floor((new Date() - new Date(timestamp)) / 1000);
            const min = Math.floor(diff / 60);
            if (min >= 20) return `<span class="text-red-500 font-black">CRÍTICO: ${min}m</span>`;
            if (min >= 10) return `<span class="text-orange-400 font-bold">ATENÇÃO: ${min}m</span>`;
            return `<span class="text-green-400 font-mono">${min}m ${diff % 60}s</span>`;
        }

        async function darBaixa(id, nome) {
            if (!confirm(`Confirmar que o contato com ${nome} foi realizado?`)) return;
            const el = document.getElementById(`card-${id}`);
            el.style.opacity = '0';
            el.style.transform = 'scale(0.9)';
            await fetch(`${FIREBASE_URL}leads/${id}.json`, { 
                method: 'PATCH', 
                body: JSON.stringify({ done: true }) 
            });
            setTimeout(fetchLeads, 400);
        }

        async function fetchLeads() {
            try {
                const res = await fetch(`${FIREBASE_URL}leads.json`);
                const data = await res.json();
                const grid = document.getElementById('grid-leads');
                const noLeads = document.getElementById('no-leads');
                
                if (!data) { grid.innerHTML = ''; noLeads.classList.remove('hidden'); return; }
                
                const ativos = Object.keys(data).filter(id => !data[id].done);
                if (ativos.length === 0) { grid.innerHTML = ''; noLeads.classList.remove('hidden'); return; }
                noLeads.classList.add('hidden');

                // Lógica de notificação para novos leads
                if (leadsAtuais.length > 0) {
                    const novos = ativos.filter(id => !leadsAtuais.includes(id));
                    novos.forEach(id => {
                        setTimeout(() => { document.getElementById(`card-${id}`)?.classList.add('lead-novo'); }, 500);
                    });
                }
                leadsAtuais = ativos;
                grid.innerHTML = '';

                ativos.reverse().forEach(id => {
                    const l = data[id];
                    const tel = l.telefone ? l.telefone.replace(/\D/g,'') : '';
                    
                    grid.innerHTML += `
                        <div id="card-${id}" class="card bg-slate-800 p-6 rounded-xl shadow-2xl border border-slate-700 ${l.urgencia?.classe || 'urgencia-1'}">
                            <div class="flex justify-between items-start mb-6">
                                <span class="text-[10px] font-black uppercase bg-slate-900 px-3 py-1 rounded-md border border-slate-700 tracking-widest text-slate-300">
                                    ${l.interesse || 'EVENTO'}
                                </span>
                                <div class="text-right">
                                    <div class="text-sm font-bold text-white">${l.urgencia?.label || '🚨 NOVO LEAD'}</div>
                                    <div class="text-xs cronometro" data-ts="${l.timestamp}">${formatarTempo(l.timestamp)}</div>
                                </div>
                            </div>
                            <h2 class="text-xl font-black mb-1 truncate text-white">${l.nome}</h2>
                            <p class="text-slate-400 font-semibold text-sm mb-6">${l.empresa || 'Sinta Iandê'}</p>
                            <div class="flex gap-3 pt-4 border-t border-slate-700">
                                <a href="https://app.tallos.com.br/#/app/chat/phone/${tel}" target="_blank" 
                                   class="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold text-center text-xs transition uppercase tracking-tighter">
                                   Atender
                                </a>
                                <button onclick="darBaixa('${id}', '${l.nome}')" 
                                        class="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-lg font-bold text-center text-xs transition uppercase tracking-tighter text-slate-200">
                                   Concluído
                                </button>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error("Erro ao carregar leads:", e); }
        }

        // Atualiza os cronômetros a cada segundo
        setInterval(() => {
            document.querySelectorAll('.cronometro').forEach(el => {
                el.innerHTML = formatarTempo(el.getAttribute('data-ts'));
            });
        }, 1000);

        // Atualiza a lista de leads a cada 5 segundos
        setInterval(fetchLeads, 5000);
        fetchLeads();
    </script>
</body>
</html>
